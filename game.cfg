MEMORY {
  HEADER:   start=$0000, size=$0010, fill=yes, fillval=$00;
  ZEROPAGE: start=$0000, size=$00FF;
  OAM:      start=$0200, size=$0100;
  RAM:      start=$0300, size=$0500;
  ROM:      start=$8000, size=$8000, fill=yes, fillval=$FF;
  VECTORS:  start=$FFFA, size=$0006;
  CHARS:    start=$0000, size=$2000, fill=yes, fillval=$00;
}

SEGMENTS {
  HEADER:   load=HEADER,  type=ro;
  ZEROPAGE: load=ZEROPAGE, type=zp;
  OAM:      load=OAM,     type=bss, define=yes;
  BSS:      load=RAM,     type=bss;
  CODE:     load=ROM,     type=ro,  start=$8000;
  VECTORS:  load=ROM,     type=ro,  start=$FFFA;
  CHARS:    load=CHARS,   type=ro;
}
